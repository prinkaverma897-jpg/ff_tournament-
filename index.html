<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF Tournament - Login</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6600">

<style>
body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#111;
}

.login-box{
width:95%;
max-width:420px;
background:#1c1c1c;
padding:25px;
border-radius:18px;
box-shadow:0 0 20px rgba(255,102,0,.4);
}

.logo{
font-size:60px;
text-align:center;
margin-bottom:10px;
}

h2{
text-align:center;
margin-bottom:20px;
color:white;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
background:#2a2a2a;
color:#fff;
font-size:16px;
}

a{
color:#ff6600;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="login-box">

<div class="logo">🔥</div>

<h2>FF Tournament Login</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button id="loginBtn">LOGIN</button>

<p style="text-align:center;margin-top:20px;color:white;">
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</div>

<script src="script.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyARD_gzjk4CBtFZ-3OdFrvxLoZeWaRGi2k",
authDomain:"ff-tournament-23632.firebaseapp.com",
databaseURL:"https://ff-tournament-23632-default-rtdb.firebaseio.com",
projectId:"ff-tournament-23632",
storageBucket:"ff-tournament-23632.firebasestorage.app",
messagingSenderId:"835922870929",
appId:"1:835922870929:web:300ebd777b1ce8f7167530"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

document.getElementById("loginBtn").onclick=()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("Login Successful");
window.location.href="dashboard.html";
})
.catch(err=>{
alert(err.message);
});

};
</script>

</body>
</html>
