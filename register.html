<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FF Tournament</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    🔥 FF TOURNAMENT 🔥
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="register.html">Register</a>
    <a href="payment.html">Payment</a>
    <a href="rules.html">Rules</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

<div class="card">
<h2>Player Registration</h2>

<form>
<label>Player Name</label><br>
<input type="text" id="playerName" placeholder="Enter Name" style="width:100%;padding:10px;margin:10px 0;"><br>

<label>Free Fire UID</label><br>
<input type="number" id="uid" placeholder="Enter UID" style="width:100%;padding:10px;margin:10px 0;"><br>

<label>Mobile Number</label><br>
<input type="tel" id="mobile" placeholder="Enter Mobile Number" style="width:100%;padding:10px;margin:10px 0;"><br>

<button type="button" id="registerBtn">
Submit Registration
</button>
</form>

</div>

</div>

<footer>
© 2026 FF Tournament
</footer>

<script src="script.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyARD_gzjk4CBtFZ-3OdFrvxLoZeWaRGi2k",
  authDomain: "ff-tournament-23632.firebaseapp.com",
  databaseURL: "https://ff-tournament-23632-default-rtdb.firebaseio.com",
  projectId: "ff-tournament-23632",
  storageBucket: "ff-tournament-23632.firebasestorage.app",
  messagingSenderId: "835922870929",
  appId: "1:835922870929:web:300ebd777b1ce8f7167530"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
import { getAuth } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

document.getElementById("registerBtn").addEventListener("click", () => {

alert("Button Clicked");

console.log("Saving...");

  const playerName = document.getElementById("playerName").value;
  const uid = document.getElementById("uid").value;
  const mobile = document.getElementById("mobile").value;

const user = auth.currentUser;

push(ref(db, "registrations"), {
  playerName: playerName,
  uid: uid,
  mobile: mobile,
  email: user.email,
  status: "Pending",
  roomId: "",
  roomPassword: ""
})
  })
  .then(() => {
  alert("Registration Successful!");
  window.location.href = "payment.html";
})
  .catch((error) => {
alert(error.code + "\n" + error.message);
  });

});
</script>
</body>
</html>
