<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - FF Tournament</title>

<link rel="stylesheet" href="style.css">

<style>
body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#111,#000);
}

.card{
width:95%;
max-width:420px;
padding:25px;
border-radius:20px;
background:#1c1c1c;
box-shadow:0 0 20px rgba(255,102,0,.4);
}

.logo{
text-align:center;
font-size:60px;
margin-bottom:10px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
background:#2b2b2b;
color:#fff;
font-size:16px;
}

a{
color:#ff6600;
text-decoration:none;
font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">🔥</div>

<h2>Create Account</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="tel" id="mobile" placeholder="Mobile Number">

<input type="email" id="email" placeholder="Email">

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button id="signupBtn">CREATE ACCOUNT</button>

<p style="text-align:center;margin-top:20px;">
Already have an account?
<a href="index.html">Login</a>
</p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyARD_gzjk4CBtFZ-3OdFrvxLoZeWaRGi2k",
  authDomain: "ff-tournament-23632.firebaseapp.com",
  databaseURL: "https://ff-tournament-23632-default-rtdb.firebaseio.com",
  projectId: "ff-tournament-23632",
  storageBucket: "ff-tournament-23632.firebasestorage.app",
  messagingSenderId: "835922870929",
  appId: "1:835922870929:web:300ebd777b1ce8f7167530"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("signupBtn").onclick = () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(email==="" || password===""){
alert("Please fill all required fields");
return;
}

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("Account Created Successfully!");
window.location.href="index.html";
})
.catch(err=>{
alert(err.message);
});

};
</script>

</body>
</html>
