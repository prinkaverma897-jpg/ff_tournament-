<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - FF Tournament</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
🔥 FF TOURNAMENT 🔥
</header>

<div class="container">

<div class="card">

<h2>Create Account</h2>

<form>



<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="text" id="username" placeholder="Username" required>

<input type="password" id="password" placeholder="Password" required>


<button type="button" id="signupBtn">
Create Account
</button>

</form>

<br>

<p style="text-align:center;">
Already have an account?
<a href="index.html">Login</a>
</p>

</div>

</div>

<script src="script.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyARD_gzjk4CBtFZ-3OdFrvxLoZeWaRGi2k",
  authDomain: "ff-tournament-23632.firebaseapp.com",
  databaseURL: "https://ff-tournament-23632-default-rtdb.firebaseio.com",
  projectId: "ff-tournament-23632",
  storageBucket: "ff-tournament-23632.firebasestorage.app",
  messagingSenderId: "835922870929",
  appId: "1:835922870929:web:300ebd777b1ce8f7167530",
  measurementId: "G-B9QF7G3R4K"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
document.getElementById("signupBtn").addEventListener("click", () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Account Created Successfully!");
window.location.href = "login.html";
    })
    .catch((error) => {
      alert(error.message);
    });

});
</script>
</body>
</html>
