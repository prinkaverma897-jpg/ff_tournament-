<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🔥 ADMIN PANEL 🔥</header>

<div class="container">

<h2>Player Registrations</h2>

<div id="players">
Loading...
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyARD_gzjk4CBtFZ-3OdFrvxLoZeWaRGi2k",
  authDomain: "ff-tournament-23632.firebaseapp.com",
  databaseURL: "https://ff-tournament-23632-default-rtdb.firebaseio.com",
  projectId: "ff-tournament-23632",
  storageBucket: "ff-tournament-23632.firebasestorage.app",
  messagingSenderId: "835922870929",
  appId: "1:835922870929:web:300ebd777b1ce8f7167530"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

onAuthStateChanged(auth, (user) => {

  if (!user) {
    alert("Please Login First");
    window.location.href = "index.html";
    return;
  }

  if (user.email !== "hacrrking897@gmail.com") {
    alert("Access Denied!");
    window.location.href = "dashboard.html";
    return;
  }

});

const players = document.getElementById("players");

onValue(ref(db, "registrations"), (snapshot) => {

  players.innerHTML = "";

  snapshot.forEach((child) => {

    const data = child.val();

    players.innerHTML += `
    <div class="card">
      <b>Name:</b> ${data.playerName || ""}<br>
      <b>UID:</b> ${data.uid || ""}<br>
      <b>Mobile:</b> ${data.mobile || ""}<br>
      <b>Status:</b> ${data.status || "Pending"}<br><br>

      <button onclick="approvePlayer('${child.key}')">Approve</button>
      <br><br>

      <button onclick="rejectPlayer('${child.key}')">Reject</button>
      <br><br>

      <input type="text" id="room${child.key}" placeholder="Room ID"><br><br>

      <input type="text" id="pass${child.key}" placeholder="Room Password"><br><br>

      <button onclick="saveRoom('${child.key}')">Save Room</button>
    </div><br>
    `;

  });

});

window.approvePlayer = function(id){
  update(ref(db,"registrations/"+id),{
    status:"Approved"
  });
  alert("Player Approved");
}

window.rejectPlayer = function(id){
  update(ref(db,"registrations/"+id),{
    status:"Rejected"
  });
  alert("Player Rejected");
}

window.saveRoom = function(id){

  const roomId=document.getElementById("room"+id).value;
  const roomPass=document.getElementById("pass"+id).value;

  update(ref(db,"registrations/"+id),{
    roomId:roomId,
    roomPassword:roomPass
  });

  alert("Room Saved");

}

</script>

</body>
</html>
