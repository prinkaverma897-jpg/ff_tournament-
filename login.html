<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FF Tournament</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>🔥 FF TOURNAMENT 🔥</header>

<div class="container">
<div class="card">

<h2>Player Login</h2>

<input type="email" id="email" placeholder="Enter Email"><br><br>

<input type="password" id="password" placeholder="Enter Password"><br><br>

<button id="loginBtn">Login</button>

<br><br>

<p>
Don't have an account?
<a href="signup.html">Create Account</a>
</p>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyARD_gzjk4CBtFZ-3OdFrvxLoZeWaRGi2k",
  authDomain: "ff-tournament-23632.firebaseapp.com",
  databaseURL: "https://ff-tournament-23632-default-rtdb.firebaseio.com",
  projectId: "ff-tournament-23632",
  storageBucket: "ff-tournament-23632.firebasestorage.app",
  messagingSenderId: "835922870929",
  appId: "1:835922870929:web:300ebd777b1ce8f7167530"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth, email, password)
.then(() => {
    alert("Login Successful!");
    window.location.href = "dashboard.html";
})
.catch((error) => {
    alert(error.message);
});

});
</script>

</body>
</html>
